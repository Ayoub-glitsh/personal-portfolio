<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap');
    
    .text {
      font-family: 'Outfit', sans-serif;
      font-size: 48px;
      fill: #3b82f6;
      font-weight: 700;
      white-space: pre;
    }
    
    .cursor {
      fill: #3b82f6;
      animation: blink 0.8s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    
    .typing {
      overflow: hidden;
      display: inline-block;
      animation: typing 4s steps(30, end) infinite;
    }
    
    @keyframes typing {
      0%, 10% { content: ""; }
      60%, 100% { content: "Ayoub Aguezar — Portfolio"; }
    }
    
    /* Simulate typing effect with stroke manipulation or specialized reveal */
    .reveal {
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: reveal-text 8s linear infinite;
    }
    
    @keyframes reveal-text {
      0%, 10% { stroke-dashoffset: 1000; fill: transparent; }
      40%, 60% { stroke-dashoffset: 0; fill: #3b82f6; }
      90%, 100% { stroke-dashoffset: 1000; fill: transparent; }
    }
  </style>

  <text x="50%" y="60" text-anchor="middle" class="text">
    <tspan class="reveal">Ayoub Aguezar — Portfolio</tspan>
  </text>
  
  <!-- Blinking cursor at the end of text (approximate position) -->
  <rect x="680" y="25" width="4" height="45" class="cursor" />
</svg>
